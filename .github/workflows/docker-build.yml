name: Docker Build and Push

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Verify main.py exists
      run: |
        if [ -f main.py ]; then
          echo "main.py found"
        else
          echo "main.py not found"
          exit 1
        fi
    
    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Build Docker image
      run: docker build -t aviyalamnjit/qrcode_maker:latest .
    
    - name: Test Docker image
      run: |
        docker run --rm aviyalamnjit/qrcode_maker:latest --url https://github.com/ay389-NJIT/assignment7
    
    - name: Push Docker image to DockerHub
      run: docker push aviyalamnjit/qrcode_maker:latest